# All four apps + Postgres + one-shot init/seed services.
#
# Bring up the whole stack:
#   docker compose up --build
#
# The dependency order is:
#   db   →  init-db  →  seed-users  →  pr-app-back     →  pr-app-front
#                    →  invoice-app-back →  invoice-app-front
#
# `init-db` and `seed-users` are one-shot containers (restart: "no") that
# exit once they have done their job. The long-running services wait for
# them via `condition: service_completed_successfully`.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: casestudy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d casestudy"]
      interval: 3s
      timeout: 3s
      retries: 20

  # Creates the schema. Idempotent — safe to re-run.
  init-db:
    build:
      context: ./pr-app/back
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: casestudy
    command: ["uv", "run", "pr-init-db"]
    restart: "no"

  # Inserts the three seed users (alice, bob, finadmin). Idempotent.
  seed-users:
    build:
      context: ./pr-app/back
    depends_on:
      init-db:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: casestudy
    command: ["uv", "run", "pr-seed-users"]
    restart: "no"

  pr-app-back:
    build:
      context: ./pr-app/back
    depends_on:
      seed-users:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: casestudy
    ports:
      - "8001:8001"

  pr-app-front:
    build:
      context: ./pr-app/front
    depends_on:
      - pr-app-back
    environment:
      VITE_API_URL: http://localhost:8001
    ports:
      - "5173:5173"

  invoice-app-back:
    build:
      context: ./invoice-app/back
    depends_on:
      db:
        condition: service_healthy
      seed-users:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: casestudy
    ports:
      - "8002:8002"

  invoice-app-front:
    build:
      context: ./invoice-app/front
    depends_on:
      - invoice-app-back
    environment:
      VITE_API_URL: http://localhost:8002
    ports:
      - "5174:5174"

volumes:
  pgdata:
